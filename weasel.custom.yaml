皮肤背景: &皮肤背景 0xFFFFFF
皮肤文字: &皮肤文字 0x030117
皮肤选中背景: &皮肤选中背景 0x2D2D7A
皮肤选中文字: &皮肤选中文字 0xFAFAFA
字体: &字体 "MiSans:Light, MiSans TC, MiSansL3, 新雅黑"

patch:
  preset_color_schemes:
    moreless:
      name: 极简
      author: 九
      color_format: rgba
      back_color: 0xFFFFFF
      border_color: 0xD8D8D8
      text_color: 0x424242
      comment_text_color: 0x707071
      label_color: 0x707071
      hilited_candidate_text_color: 0x326FE6
      hilited_candidate_back_color: 0xE6F0FD
      hilited_label_color: 0x326FE6
      hilited_comment_text_color: 0xA2BEF3
  app_options/+:
    windowsterminal.exe:
      ascii_mode: true
  style:
    color_scheme: moreless
    inline_preedit: true
    click_to_capture: true
    fullscreen: true
    font_face: *字体
    label_font_face: *字体
    comment_font_face: *字体
    font_point: 18
    label_font_point: 14
    comment_font_point: 18
    layout:
      align_type: center
      min_width: 0
      min_height: 0
      type: vertical
      border_width: 1
      corner_radius: 8
      margin_x: 14
      margin_y: 8
      candidate_spacing: 0
      hilite_spacing: 4
      hilite_padding_x: 10
      hilite_padding_y: 5
      hilited_corner_radius: 5
